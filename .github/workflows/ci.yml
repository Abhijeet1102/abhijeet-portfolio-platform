name: Portfolio CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 10
        
    - name: Install Dependencies
      run: pnpm install
      
    - name: Lint
      run: pnpm run lint
      
    - name: Build
      run: pnpm run build
      
    # - name: Test
    #   run: pnpm run test
